<!DOCTYPE html>
<html lang="tr" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Mozaik 3D Kutu Görüntüleyicisi — Pencereli Kutu</title>
  <link rel="stylesheet" href="../box.css?v=27" />
</head>
<body>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    "use strict";

    /* ---------- palette ---------- */
    const WHITE = "#f6f5f2";
    const BLUE  = "#29abe2";     // the bright cyan blue from the Mozaik logo / reference photo

    const logoImg = new Image();
    logoImg.onload  = () => init(logoImg);
    logoImg.onerror = () => { console.warn("mozaik-logo-colored.png not found"); init(null); };
    logoImg.src = "assets/mozaik-logo-colored.png";

    function init(logo) {
      console.log("init, logo:", logo ? logo.naturalWidth + "x" + logo.naturalHeight : "none");

      /* ---------- renderer ---------- */
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setClearColor(0x000000, 0);
      var __mzkWeak = (navigator.deviceMemory && navigator.deviceMemory <= 4) || (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4) || matchMedia("(prefers-reduced-motion: reduce)").matches;
      renderer.setPixelRatio(Math.min(devicePixelRatio || 1, __mzkWeak ? 1 : 1.5));  // weak devices render at 1x (big GPU saving); strong devices stay crisp at 1.5x
      renderer.shadowMap.enabled = false;   // ground shadow removed (perf: no shadow-map pass)
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputEncoding = THREE.sRGBEncoding;
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = null;

      const camera = new THREE.PerspectiveCamera(36, 1, 0.1, 100);
      camera.position.set(0, 2.5, 7.0);
      camera.lookAt(0, 0.0, 0);

      function fitToContainer() {
        const w = document.documentElement.clientWidth || innerWidth || 1280;
        const h = document.documentElement.clientHeight || innerHeight || 720;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      fitToContainer();
      if (window.ResizeObserver) new ResizeObserver(fitToContainer).observe(document.body);
      addEventListener("resize", fitToContainer);

      /* ---------- lighting ---------- */
      scene.add(new THREE.HemisphereLight(0xffffff, 0x33333a, 0.62));

      const key = new THREE.DirectionalLight(0xffffff, 0.42);
      key.position.set(4, 8, 5);
      key.castShadow = true;
      key.shadow.mapSize.set(2048, 2048);
      key.shadow.camera.near = 1; key.shadow.camera.far = 30;
      key.shadow.camera.left = key.shadow.camera.bottom = -8;
      key.shadow.camera.right = key.shadow.camera.top = 8;
      key.shadow.bias = -0.0004;
      key.shadow.radius = 7;
      scene.add(key);

      const fill = new THREE.DirectionalLight(0xffffff, 0.18);
      fill.position.set(-5, 3, -4);
      scene.add(fill);

      /* ---------- helpers ---------- */
      function toTexture(c) {
        const t = new THREE.CanvasTexture(c);
        t.encoding = THREE.sRGBEncoding;
        t.anisotropy = renderer.capabilities.getMaxAnisotropy();
        return t;
      }

      /* SOFT paper grain */
      function paperGrain(x, w, h, strength) {
        const s = (strength == null ? 1 : strength) * 0.5;
        for (let i = 0; i < w * h / 900; i++) {
          const light = Math.random() > 0.5;
          x.fillStyle = light
            ? "rgba(255,255,255," + (Math.random() * 0.07 * s) + ")"
            : "rgba(80,70,55,"   + (Math.random() * 0.05 * s) + ")";
          x.fillRect(Math.random() * w, Math.random() * h, 1.4 + Math.random() * 1.4, 1.4 + Math.random() * 1.4);
        }
        for (let i = 0; i < 22; i++) {
          const mx = Math.random() * w, my = Math.random() * h;
          const mr = 40 + Math.random() * 90;
          const g = x.createRadialGradient(mx, my, 0, mx, my, mr);
          const dark = Math.random() > 0.5;
          g.addColorStop(0, dark ? "rgba(60,55,45," + (0.03 * s) + ")" : "rgba(255,255,255," + (0.035 * s) + ")");
          g.addColorStop(1, "rgba(0,0,0,0)");
          x.fillStyle = g;
          x.fillRect(mx - mr, my - mr, mr * 2, mr * 2);
        }
      }

      const bumpTex = (function () {
        const c = document.createElement("canvas");
        c.width = c.height = 512;
        const x = c.getContext("2d");
        x.fillStyle = "#808080";
        x.fillRect(0, 0, 512, 512);
        const d = x.getImageData(0, 0, 512, 512);
        for (let i = 0; i < d.data.length; i += 4) {
          const n = 128 + (Math.random() - 0.5) * 18;
          d.data[i] = d.data[i + 1] = d.data[i + 2] = n;
        }
        x.putImageData(d, 0, 0);
        const t = new THREE.CanvasTexture(c);
        t.wrapS = t.wrapT = THREE.RepeatWrapping;
        t.repeat.set(3, 3);
        return t;
      })();

      function plainPanel(w, h, base, strength) {
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        const x = c.getContext("2d");
        x.fillStyle = base;
        x.fillRect(0, 0, w, h);
        paperGrain(x, w, h, strength == null ? 1 : strength);
        return toTexture(c);
      }

      /* white panel + the Mozaik colored logo printed centered (LANDSCAPE /
         horizontal lockup). frac = logo width as a fraction of panel width.
         yc = vertical center of the logo (0..1 from the top). */
      function logoPanelHorizontal(wPx, hPx, frac, yc) {
        const c = document.createElement("canvas");
        c.width = wPx; c.height = hPx;
        const x = c.getContext("2d");
        x.fillStyle = WHITE;
        x.fillRect(0, 0, wPx, hPx);
        if (logo) {
          const ratio = logo.naturalHeight / logo.naturalWidth;   // ~0.35 (landscape)
          const lw = Math.round(wPx * frac);
          const lh = Math.round(lw * ratio);
          const cy = (yc == null ? 0.5 : yc) * hPx;
          x.drawImage(logo, (wPx - lw) / 2, cy - lh / 2, lw, lh);
        }
        paperGrain(x, wPx, hPx, 0.4);
        return toTexture(c);
      }

      const cardMat = (map) => new THREE.MeshStandardMaterial({
        map, metalness: 0.0, roughness: 0.84, bumpMap: bumpTex, bumpScale: 0.01, side: THREE.DoubleSide
      });

      const plainWhiteMat = () => new THREE.MeshStandardMaterial({
        color: WHITE, metalness: 0.0, roughness: 0.86, bumpMap: bumpTex, bumpScale: 0.008, side: THREE.DoubleSide
      });

      /* =========================================================
         GEOMETRY — WINDOW / TISSUE BOX ("pencereli kutu"):
           · a closed WHITE cuboid built from separate panels so each
             face can carry its own print, with real board THICKNESS (T)
           · the TOP panel is die-cut with an OVAL WINDOW (the "pencere")
             through which a crumpled white tissue rises
           · the colored Mozaik logo is printed on the FRONT (+z) face and
             a smaller lockup on the LEFT (-x) end — matching the photo
           · same paper material / grain / bump as box 9 (sürgülü kutu)
         ========================================================= */
      const W = 2.7;                 // box width  (x) — the long axis
      const H = 0.55;                // box height (y) — reduced to 2/3 of the original
      const D = 1.2;                 // box depth  (z)
      const T = 0.028;               // board thickness (thin card)

      const ORX = 0.48, ORZ = 0.12;  // oval window radii (x, z) — small slot

      const whiteTex    = plainPanel(1024, 1024, WHITE, 0.5);
      // canvas aspect matches each face aspect so the logo keeps its true ratio
      const frontLogoTex = logoPanelHorizontal(1600, 293, 0.42, 0.5);   // big logo, centered (short face)
      const sideLogoTex  = logoPanelHorizontal(800, 345, 0.62, 0.5);    // smaller logo on the end

      const wMat = () => cardMat(whiteTex);

      /* faces order for BoxGeometry mats: [+x, -x, +y, -y, +z, -z] */
      function boxMesh(w, h, d, mats) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mats);
        m.castShadow = m.receiveShadow = true;
        return m;
      }

      const boxGroup = new THREE.Group();

      /* ---------- BOTTOM panel (full footprint) ---------- */
      const botPanel = boxMesh(W, T, D, [wMat(), wMat(), wMat(), wMat(), wMat(), wMat()]);
      botPanel.position.set(0, -H / 2 + T / 2, 0);
      boxGroup.add(botPanel);

      /* ---------- FRONT (+z) panel — carries the big colored logo ---------- */
      const frontMats = [wMat(), wMat(), wMat(), wMat(), cardMat(frontLogoTex), wMat()];
      const frontPanel = boxMesh(W, H - 2 * T, T, frontMats);
      frontPanel.position.set(0, 0, D / 2 - T / 2);
      boxGroup.add(frontPanel);

      /* ---------- BACK (-z) panel — carries the big colored logo too ---------- */
      const backMats = [wMat(), wMat(), wMat(), wMat(), wMat(), cardMat(frontLogoTex)];
      const backPanel = boxMesh(W, H - 2 * T, T, backMats);
      backPanel.position.set(0, 0, -D / 2 + T / 2);
      boxGroup.add(backPanel);

      /* ---------- LEFT (-x) end — smaller logo lockup ---------- */
      const leftMats = [wMat(), cardMat(sideLogoTex), wMat(), wMat(), wMat(), wMat()];
      const leftPanel = boxMesh(T, H - 2 * T, D - 2 * T, leftMats);
      leftPanel.position.set(-W / 2 + T / 2, 0, 0);
      boxGroup.add(leftPanel);

      /* ---------- RIGHT (+x) end — smaller logo lockup too ---------- */
      const rightMats = [cardMat(sideLogoTex), wMat(), wMat(), wMat(), wMat(), wMat()];
      const rightPanel = boxMesh(T, H - 2 * T, D - 2 * T, rightMats);
      rightPanel.position.set(W / 2 - T / 2, 0, 0);
      boxGroup.add(rightPanel);

      /* ---------- TOP panel with an OVAL WINDOW cut through it ---------- */
      const topShape = new THREE.Shape();
      topShape.moveTo(-W / 2, -D / 2);
      topShape.lineTo( W / 2, -D / 2);
      topShape.lineTo( W / 2,  D / 2);
      topShape.lineTo(-W / 2,  D / 2);
      topShape.lineTo(-W / 2, -D / 2);
      const hole = new THREE.Path();
      hole.absellipse(0, 0, ORX, ORZ, 0, Math.PI * 2, false, 0);
      topShape.holes.push(hole);

      const topGeo = new THREE.ExtrudeGeometry(topShape, { depth: T, bevelEnabled: false, steps: 1 });
      const topPanel = new THREE.Mesh(topGeo, plainWhiteMat());
      topPanel.rotation.x = -Math.PI / 2;            // lay the XY shape flat into the XZ plane
      topPanel.position.set(0, H / 2 - T, 0);        // seat flush on the side walls (no gap); top surface at H/2
      topPanel.castShadow = topPanel.receiveShadow = true;
      boxGroup.add(topPanel);

      /* thin darker rim tracing the oval opening — reads as the die-cut window edge */
      {
        const rimMat = new THREE.MeshBasicMaterial({ color: 0x2a2c30, side: THREE.DoubleSide });
        const seg = 90, verts = [];
        for (let i = 0; i <= seg; i++) {
          const a = (i / seg) * Math.PI * 2;
          const co = Math.cos(a), si = Math.sin(a);
          const r0x = ORX * co, r0z = ORZ * si;                 // inner edge
          const r1x = (ORX + 0.02) * co, r1z = (ORZ + 0.02) * si; // just outside
          verts.push(r0x, 0, r0z, r1x, 0, r1z);
        }
        const g = new THREE.BufferGeometry();
        const pos = [], idx = [];
        for (let i = 0; i <= seg; i++) { const a = (i / seg) * Math.PI * 2, co = Math.cos(a), si = Math.sin(a);
          pos.push(ORX * co, 0, ORZ * si);
          pos.push((ORX + 0.03) * co, 0, (ORZ + 0.03) * si);
        }
        for (let i = 0; i < seg; i++) { const k = i * 2; idx.push(k, k + 1, k + 2, k + 1, k + 3, k + 2); }
        g.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));
        g.setIndex(idx);
        const rim = new THREE.Mesh(g, rimMat);
        rim.position.y = H / 2 + 0.001;
        boxGroup.add(rim);
      }

      /* =========================================================
         REALISTIC THIN TISSUES — real paper, not a solid blob:
           · INSIDE  : a stack of folded thin sheets filling the box,
                       seen through the window ("محارم مطبقات")
           · OUTSIDE : a pulled tissue made of thin wavy paper ribbons
                       + soft draping flaps ("محرمة حقيقية رقيقة")
         ========================================================= */
      const topY = H / 2;                              // top surface / slot level
      const innerW = W - 2 * T - 0.04;
      const innerD = D - 2 * T - 0.04;

      // shared thin-paper material — pure white, matte, both faces visible (real thin sheet)
      const tissueMat = new THREE.MeshStandardMaterial({
        color: 0xffffff, roughness: 0.99, metalness: 0.0, side: THREE.DoubleSide
      });

      // gentle waviness on a flat sheet lying in the XZ plane
      function wavy(geo, amp, fx, fz, seed) {
        const p = geo.attributes.position;
        for (let i = 0; i < p.count; i++) {
          const x = p.getX(i), y = p.getY(i);          // PlaneGeometry lives in XY before rotation
          const w = Math.sin(x * fx + seed) * amp
                  + Math.cos(y * fz - seed * 1.3) * amp * 0.8
                  + Math.sin((x + y) * fx * 1.7 + seed) * amp * 0.4;
          p.setZ(i, p.getZ(i) + w);
        }
        geo.computeVertexNormals();
        return geo;
      }

      /* ---------- (A) INTERNAL folded-tissue stack ---------- */
      const stack = new THREE.Group();
      const nSheets = 14;
      const floorY = -H / 2 + T + 0.006;
      const stackTopY = topY - T - 0.04;               // keep the stack fully under the solid top panel (only seen through the slot)
      for (let i = 0; i < nSheets; i++) {
        const t = i / (nSheets - 1);
        const g = new THREE.PlaneGeometry(innerW, innerD, 12, 12);
        wavy(g, 0.010 + t * 0.012, 5.5, 6.5, i * 1.7);
        const m = new THREE.Mesh(g, tissueMat);
        m.rotation.x = -Math.PI / 2;
        m.position.set((i % 2 ? 0.01 : -0.01), floorY + t * (stackTopY - floorY), 0);
        m.receiveShadow = true;
        stack.add(m);
      }
      boxGroup.add(stack);

      /* ---------- (B) ONE thin tissue pulled out widthwise ----------
         a single sheet: pinched at the small slot, fanning out along the
         long (x) axis, mostly upright with light pleats — very thin */
      const Wt = 1.35, Ht = 0.60;
      const sheetGeo = new THREE.PlaneGeometry(Wt, Ht, 54, 34);
      {
        const p = sheetGeo.attributes.position;
        for (let i = 0; i < p.count; i++) {
          const x0 = p.getX(i), y0 = p.getY(i);
          const u = x0 / Wt;                       // -0.5..0.5 across the width
          const t = (y0 + Ht / 2) / Ht;            // 0 base .. 1 top
          const s = t * t * (3 - 2 * t);           // smoothstep
          const wScale = 0.24 + 0.76 * s;          // pinched at the slot, fans toward the top
          const px = u * Wt * wScale;
          // vertical pleats opening upward + gentle irregular wave + soft forward bulge
          const pleat = Math.sin(u * Math.PI * 5) * 0.07 * t;
          const wave  = Math.sin(t * 4.5 + u * 2.2) * 0.022 * t;
          const bulge = Math.sin(t * Math.PI) * 0.03;
          const pz = pleat + wave + bulge;
          // softly undulating (torn) top edge
          const py = y0 + Math.sin(u * Math.PI * 3) * 0.045 * Math.max(0, t - 0.55);
          p.setXYZ(i, px, py, pz);
        }
        sheetGeo.computeVertexNormals();
      }
      const tissueSheet = new THREE.Mesh(sheetGeo, tissueMat);
      tissueSheet.castShadow = true;
      tissueSheet.position.set(0, topY + Ht / 2 - 0.05, 0);   // base tucked just into the slot
      boxGroup.add(tissueSheet);

      scene.add(boxGroup);

      /* ---------- soft ground shadow ---------- */
      const groundY = -H / 2 - 0.001;
      const shadowCatcher = new THREE.Mesh(
        new THREE.PlaneGeometry(60, 60),
        new THREE.ShadowMaterial({ opacity: 0.28 })
      );
      shadowCatcher.rotation.x = -Math.PI / 2;
      shadowCatcher.position.y = groundY;
      shadowCatcher.receiveShadow = true;
      scene.add(shadowCatcher);

      /* ---------- drag to rotate 360° (mouse + 1-finger touch) ---------- */
      let dragging = false, px = 0, py = 0;
      const rot = { x: 0.26, y: -0.5 };
      boxGroup.rotation.set(rot.x, rot.y, 0);

      function applyZoom(factor) {
        camera.position.multiplyScalar(factor);
        const dd = camera.position.length();
        if (dd < 5.0) camera.position.setLength(5.0);
        if (dd > 18)  camera.position.setLength(18);
      }

      function down(cx, cy) { dragging = true; px = cx; py = cy; document.body.classList.add("grabbing"); resetIdle(); }
      function move(cx, cy) {
        if (!dragging) return;
        rot.y += (cx - px) * 0.011;
        rot.x += (cy - py) * 0.011;
        boxGroup.rotation.set(rot.x, rot.y, 0);
        px = cx; py = cy;
      }
      function up() { dragging = false; document.body.classList.remove("grabbing"); }

      addEventListener("mousedown", e => down(e.clientX, e.clientY));
      addEventListener("mousemove", e => move(e.clientX, e.clientY));
      addEventListener("mouseup", up);

      let pinchDist = 0;
      const dist = (a, b) => Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);

      addEventListener("touchstart", e => {
        e.preventDefault();
        if (e.touches.length === 2) { dragging = false; pinchDist = dist(e.touches[0], e.touches[1]); resetIdle(); }
        else if (e.touches[0]) down(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });

      addEventListener("touchmove", e => {
        e.preventDefault();
        if (e.touches.length === 2) {
          const dd = dist(e.touches[0], e.touches[1]);
          if (pinchDist > 0) applyZoom(1 + (pinchDist - dd) * 0.004);
          pinchDist = dd;
          resetIdle();
        } else if (e.touches[0]) move(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });

      addEventListener("touchend", e => {
        if (e.touches.length < 2) pinchDist = 0;
        if (e.touches.length === 0) up();
      }, { passive: false });

      addEventListener("wheel", e => { e.preventDefault(); applyZoom(1 + e.deltaY * 0.0009); }, { passive: false });

      /* ---------- gentle auto-rotate after idle ---------- */
      let autoOn = false, idleTimer = null;
      function resetIdle() {
        autoOn = false;
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => { autoOn = true; }, 3000);
      }
      resetIdle();

      /* ---------- loop ---------- */
      addEventListener("message", function (e) { if (e.data === "mzk:pause") window.__mzkPaused = true; else if (e.data === "mzk:resume") window.__mzkPaused = false; });
      document.addEventListener("visibilitychange", function () { window.__mzkPaused = document.hidden; });
      (function animate() {
        requestAnimationFrame(animate);
        if (window.__mzkPaused) return;
        if (autoOn && !dragging) { rot.y += 0.003; boxGroup.rotation.y = rot.y; }
        renderer.render(scene, camera);
      })();

      window.__debug = { THREE, boxGroup, camera, scene };

      console.log("✓ window / tissue box ready");
    }
  </script>
</body>
</html>
