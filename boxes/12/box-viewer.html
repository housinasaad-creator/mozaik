<!DOCTYPE html>
<html lang="tr" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Mozaik 3D Kutu Görüntüleyicisi — Otomatik Kilitli (Self-Assembly) Kutu</title>
  <link rel="stylesheet" href="../box.css?v=27" />
</head>
<body>

  <div class="fold-ctrl" id="foldCtrl">
    <span class="lbl" id="lblOpen">Open</span>
    <input type="range" id="foldSlider" min="0" max="1" step="0.001" value="1" />
    <span class="lbl" id="lblClose">Close</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    "use strict";

    /* ---------- palette: navy + white (matched to the reference image) ---------- */
    const WHITE = "#f6f5f2";
    const NAVY  = "#294574";

    /* load BOTH the colored logo and the WHITE logo (white one is used on the
       now all-navy exterior so it stays visible), then init */
    let logoW = null;
    let _colored = null, _loaded = 0;
    function _ready() { if (++_loaded === 2) init(_colored); }
    const ci = new Image();
    ci.onload  = () => { _colored = ci; _ready(); };
    ci.onerror = () => { console.warn("mozaik-logo-colored.png not found"); _ready(); };
    ci.src = "assets/mozaik-logo-colored.png";
    const wi = new Image();
    wi.onload  = () => { logoW = wi; _ready(); };
    wi.onerror = () => { console.warn("mozaik-logo-white.png not found"); _ready(); };
    wi.src = "assets/mozaik-logo-white.png";

    function init(logo) {
      console.log("init, colored:", logo ? "ok" : "none", "white:", logoW ? "ok" : "none");

      /* ---------- renderer ---------- */
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setClearColor(0x000000, 0);
      var __mzkWeak = (navigator.deviceMemory && navigator.deviceMemory <= 4) || (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4) || matchMedia("(prefers-reduced-motion: reduce)").matches;
      renderer.setPixelRatio(Math.min(devicePixelRatio || 1, __mzkWeak ? 1 : 1.5));  // weak devices render at 1x (big GPU saving); strong devices stay crisp at 1.5x
      renderer.shadowMap.enabled = false;   // ground shadow removed (perf: no shadow-map pass)
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputEncoding = THREE.sRGBEncoding;
      document.body.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = null;

      const camera = new THREE.PerspectiveCamera(36, 1, 0.1, 100);
      camera.position.set(0, 2.6, 8.0);
      camera.lookAt(0, 0.1, 0);

      function fitToContainer() {
        const w = document.documentElement.clientWidth || innerWidth || 1280;
        const h = document.documentElement.clientHeight || innerHeight || 720;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      fitToContainer();
      if (window.ResizeObserver) new ResizeObserver(fitToContainer).observe(document.body);
      addEventListener("resize", fitToContainer);

      /* ---------- lighting ---------- */
      scene.add(new THREE.HemisphereLight(0xffffff, 0x33333a, 0.6));

      const key = new THREE.DirectionalLight(0xffffff, 0.42);
      key.position.set(4, 8, 5);
      key.castShadow = true;
      key.shadow.mapSize.set(2048, 2048);
      key.shadow.camera.near = 1; key.shadow.camera.far = 30;
      key.shadow.camera.left = key.shadow.camera.bottom = -8;
      key.shadow.camera.right = key.shadow.camera.top = 8;
      key.shadow.bias = -0.0004;
      key.shadow.radius = 7;
      scene.add(key);

      const fill = new THREE.DirectionalLight(0xffffff, 0.18);
      fill.position.set(-5, 3, -4);
      scene.add(fill);

      /* ---------- helpers ---------- */
      function toTexture(c) {
        const t = new THREE.CanvasTexture(c);
        t.encoding = THREE.sRGBEncoding;
        t.anisotropy = renderer.capabilities.getMaxAnisotropy();
        return t;
      }

      function paperGrain(x, w, h, strength) {
        const s = strength || 1;
        for (let i = 0; i < w * h / 550; i++) {
          const light = Math.random() > 0.5;
          x.fillStyle = light
            ? "rgba(255,255,255," + (Math.random() * 0.10 * s) + ")"
            : "rgba(80,70,55,"   + (Math.random() * 0.08 * s) + ")";
          x.fillRect(Math.random() * w, Math.random() * h, 1.5 + Math.random() * 1.5, 1.5 + Math.random() * 1.5);
        }
        x.lineWidth = 1.4;
        for (let i = 0; i < w * h / 2800; i++) {
          const fx = Math.random() * w, fy = Math.random() * h;
          const len = 4 + Math.random() * 12;
          const ang = (Math.random() - 0.5) * 0.5;
          const light = Math.random() > 0.45;
          x.strokeStyle = light
            ? "rgba(255,255,255," + (Math.random() * 0.09 * s) + ")"
            : "rgba(90,80,60,"   + (Math.random() * 0.075 * s) + ")";
          x.beginPath();
          x.moveTo(fx, fy);
          x.lineTo(fx + Math.cos(ang) * len, fy + Math.sin(ang) * len);
          x.stroke();
        }
        for (let i = 0; i < 34; i++) {
          const mx = Math.random() * w, my = Math.random() * h;
          const mr = 30 + Math.random() * 90;
          const g = x.createRadialGradient(mx, my, 0, mx, my, mr);
          const dark = Math.random() > 0.5;
          g.addColorStop(0, dark ? "rgba(60,55,45," + (0.045 * s) + ")" : "rgba(255,255,255," + (0.05 * s) + ")");
          g.addColorStop(1, "rgba(0,0,0,0)");
          x.fillStyle = g;
          x.fillRect(mx - mr, my - mr, mr * 2, mr * 2);
        }
      }

      const bumpTex = (function () {
        const c = document.createElement("canvas");
        c.width = c.height = 512;
        const x = c.getContext("2d");
        x.fillStyle = "#808080";
        x.fillRect(0, 0, 512, 512);
        const d = x.getImageData(0, 0, 512, 512);
        for (let i = 0; i < d.data.length; i += 4) {
          const n = 128 + (Math.random() - 0.5) * 30;
          d.data[i] = d.data[i + 1] = d.data[i + 2] = n;
        }
        x.putImageData(d, 0, 0);
        for (let i = 0; i < 260; i++) {
          x.strokeStyle = "rgba(" + (Math.random() > 0.5 ? "200,200,200" : "60,60,60") + ",0.08)";
          const fy = Math.random() * 512, fx = Math.random() * 512;
          x.beginPath(); x.moveTo(fx, fy); x.lineTo(fx + 4 + Math.random() * 10, fy + (Math.random() - 0.5) * 2); x.stroke();
        }
        const t = new THREE.CanvasTexture(c);
        t.wrapS = t.wrapT = THREE.RepeatWrapping;
        t.repeat.set(3, 3);
        return t;
      })();

      function plainPanel(w, h, base, strength) {
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        const x = c.getContext("2d");
        x.fillStyle = base;
        x.fillRect(0, 0, w, h);
        paperGrain(x, w, h, strength == null ? 1 : strength);
        return toTexture(c);
      }

      /* white wall + the Mozaik logo pasted exactly as supplied (centered) */
      function logoPanelTexture(panelWpx, panelHpx, logoFrac) {
        const c = document.createElement("canvas");
        c.width = panelWpx; c.height = panelHpx;
        const x = c.getContext("2d");
        x.fillStyle = WHITE;
        x.fillRect(0, 0, panelWpx, panelHpx);
        if (logo) {
          const ratio = logo.naturalHeight / logo.naturalWidth;
          const lw = Math.round(panelWpx * logoFrac);
          const lh = Math.round(lw * ratio);
          x.drawImage(logo, (panelWpx - lw) / 2, (panelHpx - lh) / 2, lw, lh);
        }
        paperGrain(x, panelWpx, panelHpx, 0.5);
        return toTexture(c);
      }

      /* navy crash-lock flap texture: diagonal CREASE line (the fold that lets
         the base auto-lock) + soft shading along it — the detail that makes
         the base read like the real die-cut bottom */
      function creaseFlapTexture(w, h, diagFromLeft) {
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        const x = c.getContext("2d");
        x.fillStyle = NAVY;
        x.fillRect(0, 0, w, h);
        // diagonal crease: from the hinge corner to the inner edge
        const x0 = diagFromLeft ? 0 : w, x1 = diagFromLeft ? h : w - h;
        const grad = x.createLinearGradient(x0, 0, x1, h);
        grad.addColorStop(0, "rgba(0,0,0,0.22)");
        grad.addColorStop(1, "rgba(0,0,0,0)");
        x.fillStyle = grad;
        x.beginPath();
        x.moveTo(x0, 0);
        x.lineTo(x1, h);
        x.lineTo(x0, h);
        x.closePath();
        x.fill();
        x.strokeStyle = "rgba(255,255,255,0.20)";
        x.lineWidth = 3;
        x.beginPath(); x.moveTo(x0, 0); x.lineTo(x1, h); x.stroke();
        // faint crease shadow along the inner (seam) edge
        x.strokeStyle = "rgba(0,0,0,0.28)";
        x.lineWidth = 4;
        x.beginPath(); x.moveTo(0, h - 2); x.lineTo(w, h - 2); x.stroke();
        paperGrain(x, w, h, 0.3);
        return toTexture(c);
      }

      /* crash-lock BASE crease pattern — the die-cut fold lines drawn in GRAY over a
         given background: 4 diagonals from the corners meeting a central horizontal
         seam. Lines are HALF the previous thickness and the diamond lock-notch is
         REMOVED. Printed on both faces (navy bg outside, white bg inside). */
      function basePatternTexture(size, bg) {
        const c = document.createElement("canvas");
        c.width = c.height = size;
        const x = c.getContext("2d");
        x.fillStyle = bg; x.fillRect(0, 0, size, size);
        const cxL = size * 0.34, cxR = size * 0.66, cy = size * 0.5;
        x.strokeStyle = "rgba(150,152,160,0.9)";       // gray crease lines
        x.lineWidth = size * 0.0055; x.lineCap = "round"; x.lineJoin = "round";  // HALF thickness
        x.beginPath();
        x.moveTo(0, 0);       x.lineTo(cxL, cy);   // top-left    → center-left
        x.moveTo(0, size);    x.lineTo(cxL, cy);   // bottom-left → center-left
        x.moveTo(size, 0);    x.lineTo(cxR, cy);   // top-right    → center-right
        x.moveTo(size, size); x.lineTo(cxR, cy);   // bottom-right → center-right
        x.moveTo(cxL, cy);    x.lineTo(cxR, cy);   // central seam
        x.stroke();
        paperGrain(x, size, size, 0.3);
        return toTexture(c);
      }

      /* the Mozaik WHITE logo centered on a NAVY panel (for the all-navy exterior) */
      function logoNavyTexture(wPx, hPx, frac) {
        const c = document.createElement("canvas");
        c.width = wPx; c.height = hPx;
        const x = c.getContext("2d");
        x.fillStyle = NAVY; x.fillRect(0, 0, wPx, hPx);
        if (logoW) {
          const ratio = logoW.naturalHeight / logoW.naturalWidth;
          const lw = Math.round(wPx * frac);
          const lh = Math.round(lw * ratio);
          x.drawImage(logoW, (wPx - lw) / 2, (hPx - lh) / 2, lw, lh);
        }
        paperGrain(x, wPx, hPx, 0.4);
        return toTexture(c);
      }

      /* the COLORED Mozaik logo centered on a WHITE panel — for the top lid face
         (white background so the full colored logo, incl. the navy wordmark, stays
         visible). Pre-rotated 180° so it reads upright once the lid's frame (PI) is
         applied. `rot` lets us flip it if the orientation needs it. */
      function logoColoredTexture(size, frac, rot) {
        const c = document.createElement("canvas");
        c.width = c.height = size;
        const x = c.getContext("2d");
        x.fillStyle = WHITE; x.fillRect(0, 0, size, size);
        if (logo) {
          const ratio = logo.naturalHeight / logo.naturalWidth;
          const lw = Math.round(size * frac);
          const lh = Math.round(lw * ratio);
          x.save();
          x.translate(size / 2, size / 2);
          x.rotate(rot || 0);
          x.drawImage(logo, -lw / 2, -lh / 2, lw, lh);
          x.restore();
        }
        paperGrain(x, size, size, 0.5);
        return toTexture(c);
      }

      function normalizeUVs(geo) {
        const uv = geo.attributes.uv;
        let minU = Infinity, maxU = -Infinity, minV = Infinity, maxV = -Infinity;
        for (let i = 0; i < uv.count; i++) {
          minU = Math.min(minU, uv.getX(i)); maxU = Math.max(maxU, uv.getX(i));
          minV = Math.min(minV, uv.getY(i)); maxV = Math.max(maxV, uv.getY(i));
        }
        const su = maxU - minU || 1, sv = maxV - minV || 1;
        for (let i = 0; i < uv.count; i++) {
          uv.setXY(i, (uv.getX(i) - minU) / su, (uv.getY(i) - minV) / sv);
        }
        uv.needsUpdate = true;
        return geo;
      }

      const cardMat = (map) => new THREE.MeshStandardMaterial({
        map, metalness: 0.0, roughness: 0.85, bumpMap: bumpTex, bumpScale: 0.012, side: THREE.DoubleSide
      });

      /* =========================================================
         GEOMETRY — folding carton with a CRASH-LOCK (auto-lock)
         BOTTOM, navy + white:
           · white walls, logo centered front & back, navy sides
           · navy flat top lid
           · the BASE is the star: two navy main flaps with opposed
             45° diagonal fold edges (point-symmetric pinwheel),
             a diamond thumb-notch where they interlock at the
             center seam, and two white tuck triangles beneath —
             the exact die-cut layout of a real crash-lock bottom
           · slider: unlocks the base — main flaps swing down and
             apart, then the tuck triangles fold out after them
         ========================================================= */
      const W = 1.9, D = 1.9, H = 2.35, T = 0.012;
      const NOTCH = 0.13;                     // half-width of the center diamond notch

      const trayGroup = new THREE.Group();

      const whiteTex = plainPanel(1024, 1024, WHITE, 0.5);
      const navyTex  = plainPanel(1024, 1024, NAVY, 0.3);

      /* ---------- 4 walls: EXTERIOR all navy + white Mozaik logo, INTERIOR all
         white (the whole box reads navy outside, white inside) ---------- */
      const navyM  = () => cardMat(navyTex);
      const whiteM = () => cardMat(whiteTex);
      const logoNM = () => cardMat(logoNavyTexture(1024, 1266, 0.62));   // white logo on navy

      // front/back are W×H; +z / -z are the outer faces
      const frontWall = new THREE.Mesh(new THREE.BoxGeometry(W, H, T), [
        navyM(), navyM(), navyM(), navyM(), logoNM(), whiteM()          // +z exterior=logo/navy, -z interior=white
      ]);
      frontWall.position.set(0, H / 2, D / 2 - T / 2);
      frontWall.castShadow = frontWall.receiveShadow = true;
      trayGroup.add(frontWall);

      const backWall = new THREE.Mesh(new THREE.BoxGeometry(W, H, T), [
        navyM(), navyM(), navyM(), navyM(), whiteM(), logoNM()          // -z exterior=logo/navy, +z interior=white
      ]);
      backWall.position.set(0, H / 2, -D / 2 + T / 2);
      backWall.castShadow = backWall.receiveShadow = true;
      trayGroup.add(backWall);

      // left/right are T×H×D; -x / +x are the outer faces
      const leftWall = new THREE.Mesh(new THREE.BoxGeometry(T, H, D), [
        whiteM(), logoNM(), navyM(), navyM(), navyM(), navyM()          // -x exterior=logo/navy, +x interior=white
      ]);
      leftWall.position.set(-W / 2 + T / 2, H / 2, 0);
      leftWall.castShadow = leftWall.receiveShadow = true;
      trayGroup.add(leftWall);

      const rightWall = new THREE.Mesh(new THREE.BoxGeometry(T, H, D), [
        logoNM(), whiteM(), navyM(), navyM(), navyM(), navyM()          // +x exterior=logo/navy, -x interior=white
      ]);
      rightWall.position.set(W / 2 - T / 2, H / 2, 0);
      rightWall.castShadow = rightWall.receiveShadow = true;
      trayGroup.add(rightWall);

      /* ---------- CRASH-LOCK BASE ----------
         main flap (authored flat in shape space: x = width along its wall,
         v = inward depth): full width at the hinge, a steep diagonal on one
         side (cut back so a BIG white triangle of the tuck flap shows through
         — like the real die-cut), and half the diamond notch on the inner edge */
      const DIAG_X = -0.35;                   // where the diagonal meets the inner edge
      function mainFlapGeometry() {
        const shape = new THREE.Shape();
        shape.moveTo(-W / 2, 0);
        shape.lineTo(W / 2, 0);
        shape.lineTo(W / 2, D / 2);
        shape.lineTo(NOTCH, D / 2);
        shape.lineTo(0, D / 2 + NOTCH);       // locking tongue pointing INWARD past the seam
        shape.lineTo(-NOTCH, D / 2);
        shape.lineTo(DIAG_X, D / 2);
        shape.closePath();                    // steep diagonal back to the hinge corner
        const geo = normalizeUVs(new THREE.ExtrudeGeometry(shape, { depth: T, bevelEnabled: false }));
        geo.rotateX(-Math.PI / 2);            // shape v → -z (extends inward), thickness → +y
        return geo;
      }

      /* plain rectangular flap for the NORMAL top opening */
      function rectFlapGeometry(w, depth) {
        const shape = new THREE.Shape();
        shape.moveTo(-w / 2, 0);
        shape.lineTo(w / 2, 0);
        shape.lineTo(w / 2, depth);
        shape.lineTo(-w / 2, depth);
        shape.closePath();
        const geo = normalizeUVs(new THREE.ExtrudeGeometry(shape, { depth: T, bevelEnabled: false }));
        geo.rotateX(-Math.PI / 2);
        return geo;
      }

      /* thin BOX flap with the SAME footprint/hinge as rectFlapGeometry (hinge edge
         at z=0, extends -z). A box lets us paint the top (+y, exterior) and the
         underside (-y, interior) different colours. */
      function rectFlapBox(w, depth) {
        const g = new THREE.BoxGeometry(w, T, depth);
        g.translate(0, T / 2, -depth / 2);
        return g;
      }

      /* tuck triangle (from the side walls, sits INSIDE above the main flaps) */
      function tuckTriangleGeometry() {
        // deep triangles: the apex reaches PAST the center, so together the
        // two of them back-fill every diagonal sliver and the diamond notch —
        // nothing of the interior shows through the locked base
        const shape = new THREE.Shape();
        shape.moveTo(-D / 2, 0);
        shape.lineTo(D / 2, 0);
        shape.lineTo(0, W * 0.66);
        shape.closePath();
        const geo = normalizeUVs(new THREE.ExtrudeGeometry(shape, { depth: T, bevelEnabled: false }));
        geo.rotateX(-Math.PI / 2);
        return geo;
      }

      // two-level pivots: outer "frame" holds the fixed orientation, inner
      // "hinge" is the ONLY thing applyFold rotates (same lesson as box #1 —
      // never mix a fixed quaternion/rotation with an animated axis)
      function makeFlap(geo, mat, frameRotY, pos) {
        const frame = new THREE.Group();
        frame.rotation.y = frameRotY;
        frame.position.copy(pos);
        const hinge = new THREE.Group();
        frame.add(hinge);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.castShadow = mesh.receiveShadow = true;
        hinge.add(mesh);
        trayGroup.add(frame);
        return hinge;
      }

      /* ---------- SOLID BASE (single layer) ----------
         ONE fixed panel. Crash-lock crease pattern (thin gray, no diamond) on BOTH
         faces: NAVY field outside (-y), WHITE field inside (+y). No movement. */
      const basePatNavy  = basePatternTexture(1024, NAVY);
      const basePatWhite = basePatternTexture(1024, WHITE);
      const basePanel = new THREE.Mesh(new THREE.BoxGeometry(W, T, D), [
        navyM(), navyM(),
        cardMat(basePatWhite), cardMat(basePatNavy),   // +y interior=white+pattern, -y exterior=navy+pattern
        navyM(), navyM()
      ]);
      basePanel.position.set(0, T / 2, 0);          // closes the bottom; top face = interior floor
      basePanel.castShadow = basePanel.receiveShadow = true;
      trayGroup.add(basePanel);

      /* ---------- NORMAL TOP OPENING: ONE long navy lid hinged at the back
         (the main closure, spans the whole top) + two white tuck flaps from
         the side walls beneath it ---------- */
      const topLidFlap = makeFlap(rectFlapBox(W, D),
        [navyM(), navyM(), cardMat(logoColoredTexture(1024, 0.6, Math.PI)), whiteM(), navyM(), navyM()],   // +y exterior=navy+colored logo, -y interior=white
        Math.PI, new THREE.Vector3(0, H - T, -D / 2));

      // tuck flap on the lid's far edge: a small strip permanently folded
      // ~90° down that slips INSIDE the box behind the front wall when the
      // lid closes — the lock that secures the top closure. It's a child of
      // the lid hinge, so it travels with the lid when it swings open
      const lidTuck = new THREE.Mesh(rectFlapGeometry(W - 0.05, 0.2), cardMat(navyTex));
      lidTuck.rotation.x = -Math.PI / 2 * 1.06;      // folded down, tipped slightly INWARD
      lidTuck.position.set(0, 0, -(D - T));          // hinge right AT the lid's far edge
      lidTuck.castShadow = lidTuck.receiveShadow = true;
      topLidFlap.add(lidTuck);
      const topSideL = makeFlap(rectFlapGeometry(D - 0.02, W * 0.38), cardMat(whiteTex), -Math.PI / 2,
        new THREE.Vector3(-W / 2, H - T - 0.013, 0));
      const topSideR = makeFlap(rectFlapGeometry(D - 0.02, W * 0.38), cardMat(whiteTex), Math.PI / 2,
        new THREE.Vector3(W / 2, H - T - 0.013, 0));

      scene.add(trayGroup);
      trayGroup.position.y = -1.12;

      const boxGroup = new THREE.Group();
      boxGroup.add(trayGroup);
      scene.add(boxGroup);

      /* ---------- soft ground shadow ---------- */
      const shadowCatcher = new THREE.Mesh(
        new THREE.PlaneGeometry(60, 60),
        new THREE.ShadowMaterial({ opacity: 0.30 })
      );
      shadowCatcher.rotation.x = -Math.PI / 2;
      shadowCatcher.position.y = -1.12 - 1.6;  // low enough that open flaps never clip it
      shadowCatcher.receiveShadow = true;
      scene.add(shadowCatcher);

      /* ---------- fold state: two-phase slider ----------
         1.0 → 0.5 : the TOP opens (normal lid — navy halves swing up,
                     then the white side tucks follow)
         0.5 → 0.0 : the crash-lock BASE unlocks (main flaps swing apart,
                     the tuck triangles fold out after them) */
      let foldTarget = 1, fold = 1;
      function applyFold(t) {
        // only the TOP opens now — the base is a fixed solid panel (no movement).
        const topOpen  = Math.min(1, Math.max(0, (1 - t) * 2));
        const topMainT = Math.min(1, topOpen * 1.6);
        const topSideT = Math.max(0, (topOpen - 0.375) / 0.625);
        topLidFlap.rotation.x = 1.95 * topMainT;  // the long main lid swings up & back
        topSideL.rotation.x = 1.65 * topSideT;
        topSideR.rotation.x = 1.65 * topSideT;
      }
      applyFold(fold);

      const foldSlider = document.getElementById("foldSlider");
      const lblOpen = document.getElementById("lblOpen");
      const lblClose = document.getElementById("lblClose");
      function paintSlider() {
        const v = +foldSlider.value;
        foldSlider.style.setProperty("--val", (v * 100) + "%");
        lblClose.classList.toggle("active", v > 0.5);
        lblOpen.classList.toggle("active", v <= 0.5);
      }
      foldSlider.addEventListener("input", () => { foldTarget = +foldSlider.value; paintSlider(); resetIdle(); });
      paintSlider();
      ["pointerdown", "mousedown", "mousemove", "touchstart", "touchmove"].forEach((type) => {
        foldSlider.addEventListener(type, (e) => e.stopPropagation(), { passive: true });
      });

      /* ---------- drag to rotate 360° (mouse + 1-finger touch) ---------- */
      let dragging = false, px = 0, py = 0;
      const rot = { x: 0.42, y: Math.PI / 7 };   // start tilted so the BASE detail shows
      boxGroup.rotation.set(rot.x, rot.y, 0);

      function applyZoom(factor) {
        camera.position.multiplyScalar(factor);
        const d = camera.position.length();
        if (d < 4.5) camera.position.setLength(4.5);
        if (d > 16)  camera.position.setLength(16);
      }

      function down(cx, cy) { dragging = true; px = cx; py = cy; document.body.classList.add("grabbing"); resetIdle(); }
      function move(cx, cy) {
        if (!dragging) return;
        rot.y += (cx - px) * 0.011;
        rot.x += (cy - py) * 0.011;
        boxGroup.rotation.set(rot.x, rot.y, 0);
        px = cx; py = cy;
      }
      function up() { dragging = false; document.body.classList.remove("grabbing"); }

      addEventListener("mousedown", e => down(e.clientX, e.clientY));
      addEventListener("mousemove", e => move(e.clientX, e.clientY));
      addEventListener("mouseup", up);

      let pinchDist = 0;
      const dist = (a, b) => Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);

      addEventListener("touchstart", e => {
        e.preventDefault();
        if (e.touches.length === 2) { dragging = false; pinchDist = dist(e.touches[0], e.touches[1]); resetIdle(); }
        else if (e.touches[0]) down(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });

      addEventListener("touchmove", e => {
        e.preventDefault();
        if (e.touches.length === 2) {
          const d = dist(e.touches[0], e.touches[1]);
          if (pinchDist > 0) applyZoom(1 + (pinchDist - d) * 0.004);
          pinchDist = d;
          resetIdle();
        } else if (e.touches[0]) move(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });

      addEventListener("touchend", e => {
        if (e.touches.length < 2) pinchDist = 0;
        if (e.touches.length === 0) up();
      }, { passive: false });

      addEventListener("wheel", e => { e.preventDefault(); applyZoom(1 + e.deltaY * 0.0009); }, { passive: false });

      /* ---------- gentle auto-rotate after idle ---------- */
      let autoOn = false, idleTimer = null;
      function resetIdle() {
        autoOn = false;
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => { autoOn = true; }, 3000);
      }
      resetIdle();

      /* ---------- loop ---------- */
      addEventListener("message", function (e) { if (e.data === "mzk:pause") window.__mzkPaused = true; else if (e.data === "mzk:resume") window.__mzkPaused = false; });
      document.addEventListener("visibilitychange", function () { window.__mzkPaused = document.hidden; });
      (function animate() {
        requestAnimationFrame(animate);
        if (window.__mzkPaused) return;
        if (autoOn && !dragging) { rot.y += 0.003; boxGroup.rotation.y = rot.y; }
        if (Math.abs(foldTarget - fold) > 0.0005) {
          fold += (foldTarget - fold) * 0.09;
          applyFold(fold);
        }
        renderer.render(scene, camera);
      })();

      window.__debug = { THREE, boxGroup, trayGroup, basePanel, camera, scene,
        setFold: (t) => { foldTarget = t; fold = t; applyFold(t); } };

      console.log("✓ crash-lock box ready");
    }
  </script>
</body>
